<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para JP💚</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:radial-gradient(circle,#021202,#000);
color:white;
overflow-x:hidden;
text-align:center;
}

/* corte de espada */

#slash{

position:fixed;
top:50%;
left:-120%;
width:200%;
height:6px;

background:linear-gradient(90deg, transparent,#00ff88,#00ff88,transparent);

transform:rotate(-20deg);

box-shadow:0 0 20px #00ff88,0 0 40px #00ff88;

animation:slashAnim 1.5s ease-out forwards;

z-index:10;

}

@keyframes slashAnim{

0%{
left:-120%;
opacity:1;
}

70%{
opacity:1;
}

100%{
left:120%;
opacity:0;
}

}

/* estrelas */

.star{
position:absolute;
width:18px;
opacity:0.6;
animation:blink 2s infinite alternate;
}

@keyframes blink{
from{opacity:0.2}
to{opacity:1}
}

/* seção */

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
}

/* título */

h1{
font-size:65px;
color:#4cff4c;
text-shadow:0 0 15px #00ff88,0 0 30px #00ff88;
}

/* imagem zoro */

.zoro{
width:280px;
margin-top:25px;
filter:drop-shadow(0 0 30px #00ff88);
animation:flutuar 5s ease-in-out infinite;
}

@keyframes flutuar{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

/* texto */

p{
margin-top:20px;
font-size:20px;
width:60%;
line-height:1.6;
}

/* espadas */

.swords{
margin-top:40px;
display:flex;
gap:40px;
}

.swords img{
width:130px;
filter:drop-shadow(0 0 15px #00ff88);
animation:espadaFloat 4s ease-in-out infinite;
}

.swords img:nth-child(2){
animation-delay:1s;
}

.swords img:nth-child(3){
animation-delay:2s;
}

@keyframes espadaFloat{
0%,100%{transform:translateY(0) rotate(-5deg)}
50%{transform:translateY(-25px) rotate(5deg)}
}

/* botões */

.botoes{
margin-top:40px;
}

.botoes button{

padding:15px 25px;
margin:10px;
font-size:18px;
background:#2ecc71;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
color:white;

}

.botoes button:hover{
transform:scale(1.1);
background:#27ae60;
}

/* mensagem */

#mensagem{
margin-top:30px;
font-size:22px;
color:#7CFF7C;
min-height:40px;
}

/* corações */

.heart{
position:fixed;
bottom:-40px;
animation:subir 6s linear infinite;
}

.heart img{
width:30px;
}

@keyframes subir{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div id="slash"></div>

<section>

<h1>Para JP 💚</h1>

<img class="zoro" src="zoro.png">

<p>
Se o Zoro enfrenta qualquer batalha por quem ele ama,
então eu também enfrentaria qualquer coisa por você.
Entre bilhões de pessoas no mundo,
você ainda é uma das pessoas mais especiais pra mim.
</p>

<div class="swords">

<img src="sword1.png">
<img src="sword2.png">
<img src="sword3.png">

</div>

<div class="botoes">

<button onclick="mostrarMensagem('msg1')">Tem algo que eu quero te dizer..</button>
<button onclick="mostrarMensagem('msg2')">Você é perfeito..</button>
<button onclick="mostrarMensagem('msg3')">Mais que importante..</button>
<button onclick="mostrarMensagem('msg4')">Sem você eu nunca mais seria feliz como sou hoje, você é tudo pra mim.</button>

</div>

<p id="mensagem"></p>

</section>

<script>

/* estrelas */

for(let i=0;i<120;i++){

let star=document.createElement("img");

star.src="star.png";

star.classList.add("star");

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

}

/* corações */

function heart(){

let h=document.createElement("div");

h.classList.add("heart");

h.innerHTML='<img src="heart.png">';

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},6000);

}

setInterval(heart,500);

/* mensagens */

function mostrarMensagem(tipo){

let texto="";

if(tipo=="msg1"){
texto="Jp, você é uma das pessoas mais importantes da minha vida.";
}

if(tipo=="msg2"){
texto="Cada conversa com você vira uma memória especial que eu guardo com carinho.";
}

if(tipo=="msg3"){
texto="Como o zoro protege todos a quem ama, sempre irei te proteger como ele protege seus amigos, de forma leal e amorosa..";
}

if(tipo=="msg4"){
texto="Obrigado por existir e tornar meus piores dias em dias bons 💚";
}

document.getElementById("mensagem").innerText = texto;

}

</script>

</body>
</html>
